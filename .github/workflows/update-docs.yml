name: update-docs

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: source
        run: uv sync

      - name: Run update script
        working-directory: source
        run: uv run python main.py
        timeout-minutes: 180
        env:
          TRANSLATION_PROVIDER: ${{ secrets.TRANSLATION_PROVIDER }}
          TRANSLATION_MODEL: ${{ secrets.TRANSLATION_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Generate sidebars
        run: npm run generate-sidebars

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versioned_docs/ versioned_sidebars/
          if ! git diff --cached --quiet; then
            git commit -m "docs: sync documentation"
            git push
          else
            echo "No changes to commit."
          fi
